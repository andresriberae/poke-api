<style>
  /* Card base */
  .pokemon-card {
    transition: all 0.25s ease;
    background: #f8f9fa;
  }

  /* Hover */
  .pokemon-card:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
  }

  /* Imagen centrada tipo pokedex */
  .pokemon-img-wrapper {
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Animación de imagen */
  .pokemon-card img {
    transition: transform 0.3s ease;
  }

  .pokemon-card:hover img {
    transform: scale(1.15) rotate(-3deg);
  }
</style>

<div class="container py-4">
  <!-- Título -->
  <h1 class="display-5 fw-bold text-center mb-4">Pokemon List</h1>

  <!-- Divider -->
  <hr class="mb-5" />

  <!-- Grid -->
  <div class="row g-4">
    @for (item of pokemon(); track item.id) {
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <a [routerLink]="['/pokemons', item.id]" class="text-decoration-none">
          <div
            class="card pokemon-card h-100 border-0 shadow-sm rounded-4 text-center p-3"
          >
            <!-- Imagen -->
            <div class="pokemon-img-wrapper mb-3">
              <img [src]="item.image" alt="pokemon-image" class="img-fluid" />
            </div>

            <!-- Nombre -->
            <h6 class="fw-bold mb-0">
              {{ item.name | titlecase }}
            </h6>
          </div>
        </a>
      </div>
    }
  </div>
</div>
