<h1 class="fs-3">The Simpsons List</h1>

<br class="" />

<div class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-4">
  @for (item of pokemons(); track $index) {
    <div class="col">
      <a
        [routerLink]="['/pokemons', item.name]"
        class="card link-underline link-underline-opacity-0"
        style="width: 14rem"
      >
        <img src="{{ item.image }}" class="card-img-top w-100" alt="..." />
        <div class="card-body">
          <h5 class="card-title text-center fw-bold">
            {{ item.name | titlecase }}
          </h5>
        </div>
      </a>
    </div>
  }
</div>
