<style>
  /* Card izquierda (imagen) */
  .pokemon-detail-card {
    background: linear-gradient(135deg, #f8f9fa, #e9ecef);
    transition: all 0.3s ease;
  }

  .pokemon-detail-card:hover {
    transform: scale(1.03);
  }

  /* Info boxes */
  .info-box {
    background: #f8f9fa;
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    transition: all 0.2s ease;
  }

  .info-box small {
    color: #6c757d;
  }

  .info-box:hover {
    background: #e9ecef;
  }
</style>
<div class="container py-4">
  <!-- Título -->
  <h1 class="display-5 fw-bold text-center mb-4">
    {{ pokemon()?.name | titlecase }}
  </h1>

  <!-- Divider -->
  <hr class="mb-5" />

  <div class="row align-items-center g-4">
    <!-- Imagen -->
    <div class="col-12 col-md-5 text-center">
      <div class="pokemon-detail-card p-4 rounded-4 shadow-sm">
        <img
          [src]="pokemon()?.sprites?.front_default"
          class="img-fluid"
          alt="pokemon-image"
          style="max-height: 350px"
        />
      </div>
    </div>

    <!-- Información -->
    <div class="col-12 col-md-7">
      <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-4">
          <h4 class="fw-bold mb-3">
            {{ pokemon()?.name | titlecase }}
          </h4>

          <p class="text-muted mb-4">
            Pokémon básico obtenido desde la API. Aquí puedes agregar
            descripción dinámica si luego la integras.
          </p>

          <!-- Stats -->
          <div class="row g-3">
            <div class="col-6">
              <div class="info-box">
                <small>Height</small>
                <div class="fw-semibold">
                  {{ pokemon()?.height }}
                </div>
              </div>
            </div>

            <div class="col-6">
              <div class="info-box">
                <small>Weight</small>
                <div class="fw-semibold">
                  {{ pokemon()?.weight }}
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="info-box">
                <small>Base Experience</small>
                <div class="fw-semibold">
                  {{ pokemon()?.base_experience }}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
